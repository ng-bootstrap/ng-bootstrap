<ngb-rating [(rate)]="selected" (hover)="hovered.set($event)" (leave)="hovered.set(0)" [readonly]="readonly()" />
<hr />

<pre>
Selected: <b>{{ selected() }}</b>
Hovered: <b>{{ hovered() }}</b>
</pre>

<button class="btn btn-sm btn-outline-{{ readonly() ? 'danger' : 'success' }}" (click)="readonly.update((v) => !v)">
	{{ readonly() ? 'readonly' : 'editable' }}
</button>
